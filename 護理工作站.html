<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>護理工作站 · NurseBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Tweak defaults — persisted via host
  window.TWEAKS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "scenario": "normal",
    "density": "comfort",
    "soundEnabled": false,
    "autoSimulate": true
  }/*EDITMODE-END*/;
</script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/bed.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/detail.jsx"></script>

<script type="text/babel">
function App() {
  const [theme, setTheme] = React.useState(window.TWEAKS.theme || "light");
  const [scenario, setScenario] = React.useState(window.TWEAKS.scenario || "normal");
  const [density, setDensity] = React.useState(window.TWEAKS.density || "comfort");
  const [soundEnabled, setSoundEnabled] = React.useState(window.TWEAKS.soundEnabled);
  const [autoSim, setAutoSim] = React.useState(window.TWEAKS.autoSimulate);

  const [currentWard, setCurrentWard] = React.useState("A");
  const [selectedBed, setSelectedBed] = React.useState(null);
  const [filter, setFilter] = React.useState("all");
  const [clock, setClock] = React.useState("");
  const [toasts, setToasts] = React.useState([]);
  const [tweakOpen, setTweakOpen] = React.useState(false);
  const [tweaksAvail, setTweaksAvail] = React.useState(false);

  // Live beds state — vitals drift
  const [beds, setBeds] = React.useState(() => BEDS.map(b => ({ ...b })));
  const [feed, setFeed] = React.useState(MOVEMENT_FEED);
  const [railTasks, setRailTasks] = React.useState(() => {
    const tasks = [];
    beds.filter(b => !b.empty).slice(0, 8).forEach((b, i) => {
      const times = ["15:00", "15:30", "16:00", "16:30", "17:00"];
      const titles = ["翻身 Q2H", "量血糖", "換藥", "協助進食", "抽血", "導尿管護理", "生命徵象"];
      tasks.push({
        time: times[i % times.length],
        title: titles[i % titles.length],
        bed: `${b.roomNum}-${b.bedNum}`,
        name: b.name,
        done: false,
        urgency: i < 2 ? "overdue" : i < 4 ? "soon" : "",
      });
    });
    return tasks;
  });

  // Apply theme
  React.useEffect(() => { document.documentElement.dataset.theme = theme; }, [theme]);

  // Clock
  React.useEffect(() => {
    const tick = () => {
      const d = new Date();
      const w = ["日","一","二","三","四","五","六"][d.getDay()];
      setClock(`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} 週${w} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  // Live vitals drift for beds
  React.useEffect(() => {
    if (!autoSim) return;
    const id = setInterval(() => {
      setBeds(prev => prev.map(b => {
        if (b.empty) return b;
        const drift = (Math.random() - 0.5);
        const critMultiplier = scenario === "code" && b.status === "crit" ? 3 : 1;
        return {
          ...b,
          vitals: {
            ...b.vitals,
            hr: Math.round(Math.max(40, Math.min(180, b.vitals.hr + drift * 1.5 * critMultiplier))),
            spo2: Math.round(Math.max(82, Math.min(100, b.vitals.spo2 + drift * 0.4))),
            sbp: Math.round(Math.max(60, Math.min(200, b.vitals.sbp + drift * 1.5))),
            dbp: Math.round(Math.max(40, Math.min(120, b.vitals.dbp + drift * 1))),
            temp: Math.round(Math.max(35, Math.min(41, b.vitals.temp + drift * 0.03)) * 10) / 10,
            rr: Math.round(Math.max(8, Math.min(40, b.vitals.rr + drift * 0.4))),
          }
        };
      }));
    }, 1500);
    return () => clearInterval(id);
  }, [autoSim, scenario]);

  // Simulated toasts / alerts every 15-25s
  React.useEffect(() => {
    if (!autoSim) return;
    const pushToast = () => {
      const pool = [
        { type: "warn", title: "用藥提醒", meta: "床 A2-05 · 陳志強 — Ceftriaxone 1g" },
        { type: "crit", title: "SpO₂ 過低", meta: "床 A3-11 · 王淑芬 — 現值 88%" },
        { type: "ok",   title: "任務完成", meta: "床 A1-03 · 林建國 — 生命徵象已記錄" },
        { type: "warn", title: "新入院通知", meta: "床 A4-15 · 急診轉床" },
        { type: "crit", title: "呼叫鈴", meta: "床 A2-07 · 陳志強 — 主訴胸悶" },
        { type: "warn", title: "逾時用藥", meta: "床 A1-02 · Metformin 500mg" },
      ];
      const t = pool[Math.floor(Math.random() * pool.length)];
      addToast(t);
    };
    const id = setInterval(pushToast, 18000);
    return () => clearInterval(id);
  }, [autoSim]);

  const addToast = React.useCallback((t) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { ...t, id }]);
    if (soundEnabled) playBeep(t.type);
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 6000);
  }, [soundEnabled]);

  // Derive alerts from bed vitals
  const alerts = React.useMemo(() => {
    const out = [];
    beds.forEach(b => {
      if (b.empty) return;
      if (b.vitals.spo2 < 92) out.push({ level: "crit", title: `SpO₂ 偏低 ${Math.round(b.vitals.spo2)}%`, bed: `${b.roomNum}-${b.bedNum}`, time: "剛剛", name: b.name });
      else if (b.vitals.hr > 120) out.push({ level: "warn", title: `心跳偏快 ${Math.round(b.vitals.hr)} bpm`, bed: `${b.roomNum}-${b.bedNum}`, time: "2 分鐘前", name: b.name });
      else if (b.vitals.temp > 38.5) out.push({ level: "warn", title: `發燒 ${b.vitals.temp.toFixed(1)}°C`, bed: `${b.roomNum}-${b.bedNum}`, time: "5 分鐘前", name: b.name });
      else if (b.vitals.sbp < 90) out.push({ level: "crit", title: `低血壓 ${Math.round(b.vitals.sbp)}/${Math.round(b.vitals.dbp)}`, bed: `${b.roomNum}-${b.bedNum}`, time: "剛剛", name: b.name });
    });
    if (scenario === "code") {
      out.unshift({ level: "crit", title: "CODE BLUE — 心肺停止", bed: "A2-07", time: "剛剛", name: "陳志強" });
    }
    return out.slice(0, 8);
  }, [beds, scenario]);

  // Stats
  const stats = React.useMemo(() => {
    const occupied = beds.filter(b => !b.empty).length;
    const empty = beds.filter(b => b.empty).length;
    const crit = beds.filter(b => !b.empty && b.status === "crit").length;
    const warn = beds.filter(b => !b.empty && b.status === "warn").length;
    const ok = beds.filter(b => !b.empty && b.status === "ok").length;
    const pending = beds.filter(b => !b.empty && (b.pendingMeds > 0 || b.pendingTasks > 0)).length;
    const meds = beds.reduce((s, b) => s + (b.pendingMeds || 0), 0);
    const tasks = beds.reduce((s, b) => s + (b.pendingTasks || 0), 0);
    return { total: beds.length, occupied, empty, crit, warn, ok, pending, alerts: alerts.length, meds, tasks };
  }, [beds, alerts]);

  const filteredBeds = React.useMemo(() => {
    if (filter === "all") return beds;
    if (filter === "empty") return beds.filter(b => b.empty);
    if (filter === "pending") return beds.filter(b => !b.empty && (b.pendingMeds > 0 || b.pendingTasks > 0));
    return beds.filter(b => !b.empty && b.status === filter);
  }, [beds, filter]);

  // Tweaks bridge
  React.useEffect(() => {
    const onMsg = (ev) => {
      if (ev.data?.type === "__activate_edit_mode") setTweakOpen(true);
      if (ev.data?.type === "__deactivate_edit_mode") setTweakOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setTweaksAvail(true);
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateTweak = (key, value) => {
    const setters = { theme: setTheme, scenario: setScenario, density: setDensity, soundEnabled: setSoundEnabled, autoSimulate: setAutoSim };
    setters[key]?.(value);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
  };

  const playBeep = (type) => {
    try {
      const ctx = window.__actx || (window.__actx = new (window.AudioContext || window.webkitAudioContext)());
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      const freq = type === "crit" ? 880 : type === "warn" ? 520 : 660;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
      o.start();
      o.stop(ctx.currentTime + 0.27);
      if (type === "crit") {
        setTimeout(() => {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.frequency.value = 880;
          g2.gain.setValueAtTime(0.0001, ctx.currentTime);
          g2.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.02);
          g2.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
          o2.start(); o2.stop(ctx.currentTime + 0.27);
        }, 300);
      }
    } catch (e) { /* noop */ }
  };

  const toggleRailTask = (i) => setRailTasks(prev => prev.map((t, idx) => idx === i ? { ...t, done: !t.done } : t));

  if (selectedBed && !selectedBed.empty) {
    return (
      <div className="detail-shell">
        <Sidebar currentWard={currentWard} onWardChange={setCurrentWard} stats={stats} />
        <PatientDetail bed={selectedBed} onBack={() => setSelectedBed(null)} onToast={addToast} />
        <TweaksPanel open={tweakOpen} close={() => setTweakOpen(false)} theme={theme} scenario={scenario} density={density} soundEnabled={soundEnabled} autoSim={autoSim} updateTweak={updateTweak} />
        <ToastStack toasts={toasts} />
      </div>
    );
  }

  return (
    <div className="shell" data-screen-label="Ward Dashboard">
      <Sidebar currentWard={currentWard} onWardChange={setCurrentWard} stats={stats} />
      <div className="main">
        {scenario === "code" && (
          <div className="alert-banner">
            <span className="dot-pulse"></span>
            CODE BLUE · 床 A2-07 · 陳志強 — 全員支援中
            <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 500, opacity: 0.9 }}>14:32 發起 · 點擊進入緊急協作</span>
          </div>
        )}
        <Topbar stats={stats} clock={clock} ward={{A: "一般 A", B: "一般 B", ICU: "加護", ER: "急診"}[currentWard]} scenario={scenario} />
        <FilterBar filter={filter} setFilter={setFilter} counts={stats} viewMode={density} setViewMode={(v) => updateTweak("density", v)} />
        <div className="content-pad">
          <div className="bed-grid" style={density === "compact" ? { gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))" } : density === "large" ? { gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))" } : {}}>
            {filteredBeds.map(b => (
              <BedCard key={b.id} bed={b} density={density} onClick={() => setSelectedBed(b)} />
            ))}
          </div>
          {filteredBeds.length === 0 && (
            <div style={{ padding: 60, textAlign: "center", color: "var(--text-3)" }}>
              無符合條件的床位
            </div>
          )}
        </div>
      </div>
      <RightRail alerts={alerts} tasks={railTasks} feed={feed} onToggleTask={toggleRailTask} />

      <TweaksPanel open={tweakOpen} close={() => setTweakOpen(false)} theme={theme} scenario={scenario} density={density} soundEnabled={soundEnabled} autoSim={autoSim} updateTweak={updateTweak} />
      <ToastStack toasts={toasts} />
    </div>
  );
}

function TweaksPanel({ open, close, theme, scenario, density, soundEnabled, autoSim, updateTweak }) {
  if (!open) return null;
  return (
    <div className="tweaks-panel">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <h3>Tweaks</h3>
          <div className="sub">原型變化與情境切換</div>
        </div>
        <button onClick={close} style={{ color: "var(--text-3)" }}><Icon name="x" className="ic sm" /></button>
      </div>

      <div className="tweak-row">
        <div>
          <div className="tweak-label">主題</div>
          <div className="tweak-desc">明/暗模式</div>
        </div>
        <div className="seg">
          <button className={theme === "light" ? "on" : ""} onClick={() => updateTweak("theme", "light")}>明亮</button>
          <button className={theme === "dark" ? "on" : ""} onClick={() => updateTweak("theme", "dark")}>深色</button>
        </div>
      </div>

      <div className="tweak-row">
        <div>
          <div className="tweak-label">警示情境</div>
          <div className="tweak-desc">模擬不同病房壓力</div>
        </div>
        <div className="seg">
          <button className={scenario === "normal" ? "on" : ""} onClick={() => updateTweak("scenario", "normal")}>平時</button>
          <button className={scenario === "busy" ? "on" : ""} onClick={() => updateTweak("scenario", "busy")}>繁忙</button>
          <button className={scenario === "code" ? "on" : ""} onClick={() => updateTweak("scenario", "code")}>急救</button>
        </div>
      </div>

      <div className="tweak-row">
        <div>
          <div className="tweak-label">卡片密度</div>
          <div className="tweak-desc">床位資訊呈現大小</div>
        </div>
        <div className="seg">
          <button className={density === "compact" ? "on" : ""} onClick={() => updateTweak("density", "compact")}>緊湊</button>
          <button className={density === "comfort" ? "on" : ""} onClick={() => updateTweak("density", "comfort")}>標準</button>
          <button className={density === "large" ? "on" : ""} onClick={() => updateTweak("density", "large")}>放大</button>
        </div>
      </div>

      <div className="tweak-row">
        <div>
          <div className="tweak-label">警示音</div>
          <div className="tweak-desc">通知聲響</div>
        </div>
        <button className={`switch ${soundEnabled ? "on" : ""}`} onClick={() => updateTweak("soundEnabled", !soundEnabled)} />
      </div>

      <div className="tweak-row">
        <div>
          <div className="tweak-label">即時數據</div>
          <div className="tweak-desc">模擬生命徵象波動與警示</div>
        </div>
        <button className={`switch ${autoSim ? "on" : ""}`} onClick={() => updateTweak("autoSimulate", !autoSim)} />
      </div>
    </div>
  );
}

function ToastStack({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <div style={{
            width: 22, height: 22, borderRadius: 6,
            background: t.type === "crit" ? "var(--crit)" : t.type === "warn" ? "var(--warn)" : "var(--ok)",
            color: "white", display: "grid", placeItems: "center", fontSize: 12, fontWeight: 700, flexShrink: 0
          }}>{t.type === "crit" ? "!" : t.type === "warn" ? "△" : "✓"}</div>
          <div>
            <div style={{ fontWeight: 600, fontSize: 12 }}>{t.title}</div>
            <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>{t.meta}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);
</script>
</body>
</html>
